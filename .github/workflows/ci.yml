name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version: '1.26' }
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -coverprofile=coverage.out ./...

  integration:
    # End-to-end tests of the public client against an in-memory cinc-zero
    # Chef Infra Server. Lives in a separate Go module (./integration) so the
    # cinc-zero dependency never reaches the root module's consumers.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version: '1.26' }
      - run: go test -race ./...
        working-directory: integration
